name: Sync Repository Secrets (Reusable)

# Reusable workflow for syncing GitHub secrets to the deployment bot.
# Other repositories can call this workflow to automatically sync their secrets.
#
# Usage in your repository:
#   name: Sync Secrets
#   on:
#     workflow_dispatch:
#     push:
#       paths: ['.kumpeapps-deploy-bot/**']
#   jobs:
#     sync:
#       uses: kumpeapps/kumpeapps-deployment-bot/.github/workflows/sync-repository-secrets.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      bot-url:
        description: 'Deployment bot URL (default: deploy.kumpe.app)'
        required: false
        type: string
        default: 'http://deploy.kumpe.app'
    secrets:
      DEPLOYMENT_BOT_TOKEN:
        description: 'Admin API token for the deployment bot'
        required: true

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync secrets to deployment bot
        env:
          BOT_URL: ${{ inputs.bot-url }}
          BOT_TOKEN: ${{ secrets.DEPLOYMENT_BOT_TOKEN }}
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY%/*}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          echo "🚀 Syncing secrets for $REPO_OWNER/$REPO_NAME"

          # Collect env vars and filter out system/runtime variables
          SECRET_NAMES=$(env | grep -E '^[A-Z][A-Z0-9_]*=' | cut -d= -f1 | grep -v -E '^(GITHUB_|RUNNER_|CI|PATH|HOME|USER|SHELL|PWD|OLDPWD|LANG|LC_|TERM|SHLVL|_|BOT_URL|BOT_TOKEN|ACTIONS_|AGENT_|ANDROID_|AZURE_|CHROME|CONDA|DEPLOYMENT_|DOTNET_|GOROOT|GRADLE_|GRAALVM_|HOMEBREW_|ImageOS|ImageVersion|INVOCATION_ID|JAVA_|JOURNAL_STREAM|LEIN_|NVM_|PERFLOG_|POWERSHELL_|SELENIUM_|SGX_|STATS_|SWIFT_|VCPKG_|INPUT_)')

          if [ -z "$SECRET_NAMES" ]; then
            echo "⚠️  No secrets found in environment variables to sync"
            echo "⚠️  Make sure to pass your secrets via env in the caller workflow"
            exit 0
          fi
          
          SYNCED=0
          FAILED=0
          
          for SECRET_NAME in $SECRET_NAMES; do
            if [ "$SECRET_NAME" = "KUMPEAPPS_DEPLOY_BOT_TOKEN" ] || [ "$SECRET_NAME" = "DEPLOYMENT_BOT_TOKEN" ]; then
              continue
            fi

            SECRET_VALUE=""
            eval "SECRET_VALUE=\${${SECRET_NAME}:-}"
            
            if [ -z "$SECRET_VALUE" ]; then
              continue
            fi
            
            echo "📤 Syncing ${SECRET_NAME}..."
            
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${BOT_URL}/api/admin/repository-secrets/upsert" \
              -H "Authorization: Bearer ${BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"repositoryOwner\": \"${REPO_OWNER}\",
                \"repositoryName\": \"${REPO_NAME}\",
                \"name\": \"${SECRET_NAME}\",
                \"value\": \"${SECRET_VALUE}\"
              }")
            
            http_code=$(echo "$response" | tail -n1)
            
            if [ "$http_code" = "200" ]; then
              echo "✅ ${SECRET_NAME}"
              SYNCED=$((SYNCED + 1))
            else
              body=$(echo "$response" | head -n-1)
              echo "❌ ${SECRET_NAME} failed (HTTP ${http_code}): ${body}"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "📊 Summary: ${SYNCED} synced, ${FAILED} failed"
          
          if [ $FAILED -gt 0 ]; then
            exit 1
          fi
