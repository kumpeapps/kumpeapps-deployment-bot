name: Sync Repository Secrets (Reusable)

# Reusable workflow for syncing GitHub secrets to the deployment bot.
# Other repositories can call this workflow to automatically sync their secrets.
#
# Usage in your repository:
#   name: Sync Secrets
#   on:
#     workflow_dispatch:
#     push:
#       paths: ['.kumpeapps-deploy-bot/**']
#   jobs:
#     sync:
#       uses: kumpeapps/kumpeapps-deployment-bot/.github/workflows/sync-repository-secrets.yml@main
#       secrets: inherit

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment (dev, stage, prod)'
        required: false
        type: string
        default: 'dev'
      config-path:
        description: 'Path to deployment config (auto-detected if not provided)'
        required: false
        type: string
        default: ''
      bot-url:
        description: 'Deployment bot URL (default: deploy.kumpe.app)'
        required: false
        type: string
        default: 'http://deploy.kumpe.app'
    secrets:
      DEPLOYMENT_BOT_TOKEN:
        description: 'Admin API token for the deployment bot'
        required: true

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Detect deployment config
        id: config
        run: |
          CONFIG_PATH="${{ inputs.config-path }}"
          
          if [ -z "$CONFIG_PATH" ]; then
            # Auto-detect: look for .kumpeapps-deploy-bot/{environment}/*.yml
            ENV="${{ inputs.environment }}"
            SEARCH_DIR=".kumpeapps-deploy-bot/${ENV}"
            
            if [ -d "$SEARCH_DIR" ]; then
              # Find first .yml file in the directory
              CONFIG_PATH=$(find "$SEARCH_DIR" -maxdepth 1 -name "*.yml" -o -name "*.yaml" | head -n1)
            fi
            
            if [ -z "$CONFIG_PATH" ]; then
              echo "❌ No deployment config found in $SEARCH_DIR"
              exit 1
            fi
          fi
          
          echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
          echo "📄 Using config: $CONFIG_PATH"
      
      - name: Extract secrets from config
        id: secrets
        run: |
          CONFIG_FILE="${{ steps.config.outputs.config_path }}"
          
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ Config file not found: $CONFIG_FILE"
            exit 1
          fi
          
          # Extract env_mappings section and parse secret names
          # Format: DATABASE_PASSWORD: DB_PASSWORD_SECRET
          SECRET_NAMES=$(grep -A 20 'env_mappings:' "$CONFIG_FILE" | \
            grep -E '^\s+[A-Z_]+:\s*[A-Z_]+' | \
            awk '{print $2}' | \
            sort -u | \
            tr '\n' ',' | \
            sed 's/,$//')
          
          if [ -z "$SECRET_NAMES" ]; then
            echo "⚠️  No env_mappings found in $CONFIG_FILE"
            echo "secret_names=" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "secret_names=$SECRET_NAMES" >> $GITHUB_OUTPUT
          echo "🔑 Secrets to sync: $SECRET_NAMES"
      
      - name: Sync secrets to deployment bot
        if: steps.secrets.outputs.secret_names != ''
        env:
          BOT_URL: ${{ inputs.bot-url }}
          BOT_TOKEN: ${{ secrets.DEPLOYMENT_BOT_TOKEN }}
          SECRET_NAMES: ${{ steps.secrets.outputs.secret_names }}
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY%/*}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          echo "🚀 Syncing secrets for $REPO_OWNER/$REPO_NAME"
          
          # Convert comma-separated list to array
          IFS=',' read -ra SECRETS <<< "$SECRET_NAMES"
          
          SYNCED=0
          FAILED=0
          
          for SECRET_NAME in "${SECRETS[@]}"; do
            # Get secret value from GitHub secrets context
            # Note: This requires secrets to be passed with 'secrets: inherit'
            SECRET_VALUE=""
            
            # Try to get the secret value from environment
            # GitHub Actions makes secrets available as env vars when explicitly referenced
            eval "SECRET_VALUE=\${${SECRET_NAME}:-}"
            
            if [ -z "$SECRET_VALUE" ]; then
              echo "⚠️  Secret ${SECRET_NAME} not found in GitHub secrets - skipping"
              continue
            fi
            
            echo "📤 Syncing ${SECRET_NAME}..."
            
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${BOT_URL}/api/admin/repository-secrets/upsert" \
              -H "Authorization: Bearer ${BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"repositoryOwner\": \"${REPO_OWNER}\",
                \"repositoryName\": \"${REPO_NAME}\",
                \"name\": \"${SECRET_NAME}\",
                \"value\": \"${SECRET_VALUE}\"
              }")
            
            http_code=$(echo "$response" | tail -n1)
            
            if [ "$http_code" = "200" ]; then
              echo "✅ ${SECRET_NAME}"
              SYNCED=$((SYNCED + 1))
            else
              body=$(echo "$response" | head -n-1)
              echo "❌ ${SECRET_NAME} failed (HTTP ${http_code}): ${body}"
              FAILED=$((FAILED + 1))
            fi
          done
          
          echo ""
          echo "📊 Summary: ${SYNCED} synced, ${FAILED} failed"
          
          if [ $FAILED -gt 0 ]; then
            exit 1
          fi
