name: Sync Repository Secrets (Reusable)

# Reusable workflow for syncing repository secrets to the deployment bot.
#
# Syncs every application secret present in the job environment (caller `env:` block
# plus any variables loaded from a 1Password Environment). Each name is synced as-is
# to the bot; deployment configs pick up values via env_mappings.
#
# Optional 1Password Environment (no per-variable list required):
#   When both OP_SERVICE_ACCOUNT_TOKEN and OP_ENVIRONMENT_ID are set in the caller
#   repository and passed to this workflow, all variables from that Environment are
#   read with `op environment read` and exported to GITHUB_ENV under the same names.
#   If either secret is missing or empty, 1Password CLI install and env load are
#   skipped entirely; sync continues with any other env vars from the caller.
#   Requires 1Password CLI 2.33.0-beta.02+ (we install latest-beta when enabled).
#
# Usage in your repository:
#   name: Sync Secrets
#   on:
#     workflow_dispatch:
#     push:
#       paths: ['.kumpeapps-deploy-bot/**']
#   jobs:
#     sync:
#       uses: kumpeapps/kumpeapps-deployment-bot/.github/workflows/sync-repository-secrets.yml@main
#       secrets:
#         DEPLOYMENT_BOT_TOKEN: ${{ secrets.KUMPEAPPS_DEPLOY_BOT_TOKEN }}
#         OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
#         OP_ENVIRONMENT_ID: ${{ secrets.OP_ENVIRONMENT_ID }}  # or secrets.ENVIRONMENT_ID
#       # Optional: pass GitHub repo secrets in env on a wrapper job, or use inherit
#         # with explicit secret mappings above

on:
  workflow_call:
    inputs:
      bot-url:
        description: 'Deployment bot URL (default: deploy.kumpe.app)'
        required: false
        type: string
        default: 'http://deploy.kumpe.app'
    secrets:
      DEPLOYMENT_BOT_TOKEN:
        description: 'Repository or admin API token for the deployment bot'
        required: true
      OP_SERVICE_ACCOUNT_TOKEN:
        description: '1Password service account token with read access to the Environment (optional)'
        required: false
      OP_ENVIRONMENT_ID:
        description: '1Password Environment ID (optional; enables automatic env var load)'
        required: false

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Skip 1Password Environment load
        if: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN == '' || secrets.OP_ENVIRONMENT_ID == '' }}
        run: |
          echo "ℹ️ Skipping 1Password sync (set OP_SERVICE_ACCOUNT_TOKEN and OP_ENVIRONMENT_ID in caller secrets to enable)"

      - name: Install 1Password CLI
        if: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN != '' && secrets.OP_ENVIRONMENT_ID != '' }}
        uses: 1password/install-cli-action@v4
        with:
          version: latest-beta

      - name: Load all variables from 1Password Environment
        if: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN != '' && secrets.OP_ENVIRONMENT_ID != '' }}
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENVIRONMENT_ID: ${{ secrets.OP_ENVIRONMENT_ID }}
        run: |
          set -euo pipefail

          mask_value() {
            local value="$1"
            while IFS= read -r line || [ -n "$line" ]; do
              if [ -n "$line" ]; then
                echo "::add-mask::${line}"
              fi
            done <<< "$value"
          }

          write_env_var() {
            local name="$1"
            local value="$2"
            mask_value "$value"
            {
              echo "${name}<<EOF"
              printf '%s' "$value"
              echo
              echo "EOF"
            } >> "$GITHUB_ENV"
          }

          op_stderr="$(mktemp)"
          if ! env_output="$(op environment read "$OP_ENVIRONMENT_ID" 2>"$op_stderr")"; then
            echo "::error::Failed to read 1Password environment: $(tr -d '\n' < "$op_stderr")"
            rm -f "$op_stderr"
            exit 1
          fi
          rm -f "$op_stderr"

          loaded_count=0
          while IFS= read -r line || [ -n "$line" ]; do
            [ -z "$line" ] && continue
            name="${line%%=*}"
            value="${line#*=}"
            value="$(printf '%s' "$value" | tr -d '\r\n')"
            if [ -z "$name" ]; then
              continue
            fi
            write_env_var "$name" "$value"
            loaded_count=$((loaded_count + 1))
            echo "🔐 Loaded 1Password variable: ${name}"
          done <<< "$env_output"
          unset env_output

          echo "✅ Loaded ${loaded_count} variable(s) from 1Password Environment"

      - name: Sync secrets to deployment bot
        env:
          BOT_URL: ${{ inputs.bot-url }}
          BOT_TOKEN: ${{ secrets.DEPLOYMENT_BOT_TOKEN }}
        run: |
          set -euo pipefail

          REPO_OWNER="${GITHUB_REPOSITORY%/*}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          echo "🚀 Syncing secrets for $REPO_OWNER/$REPO_NAME"

          # Collect env vars and filter out system/runtime and auth credentials
          SECRET_NAMES=$(env | grep -E '^[A-Z][A-Z0-9_]*=' | cut -d= -f1 | grep -v -E '^(GITHUB_|RUNNER_|CI|PATH|HOME|USER|SHELL|PWD|OLDPWD|LANG|LC_|TERM|SHLVL|_|BOT_URL|BOT_TOKEN|OP_SERVICE_ACCOUNT_TOKEN|OP_ENVIRONMENT_ID|KUMPEAPPS_DEPLOY_BOT_TOKEN|DEPLOYMENT_BOT_TOKEN|ACTIONS_|AGENT_|ANDROID_|AZURE_|CHROME|CONDA|DEPLOYMENT_|DOTNET_|GOROOT|GRADLE_|GRAALVM_|HOMEBREW_|ImageOS|ImageVersion|INVOCATION_ID|JAVA_|JOURNAL_STREAM|LEIN_|NVM_|PERFLOG_|POWERSHELL_|SELENIUM_|SGX_|STATS_|SWIFT_|VCPKG_|INPUT_)')

          if [ -z "$SECRET_NAMES" ]; then
            echo "⚠️  No secrets found in environment variables to sync"
            echo "⚠️  Configure 1Password Environment secrets and/or pass secrets via caller workflow env"
            exit 0
          fi

          SYNCED=0
          FAILED=0

          for SECRET_NAME in $SECRET_NAMES; do
            SECRET_VALUE=""
            eval "SECRET_VALUE=\${${SECRET_NAME}:-}"

            if [ -z "$SECRET_VALUE" ]; then
              continue
            fi

            echo "📤 Syncing ${SECRET_NAME}..."

            payload=$(jq -n \
              --arg owner "$REPO_OWNER" \
              --arg repo "$REPO_NAME" \
              --arg name "$SECRET_NAME" \
              --arg value "$SECRET_VALUE" \
              '{repositoryOwner: $owner, repositoryName: $repo, name: $name, value: $value}')

            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${BOT_URL}/api/admin/repository-secrets/upsert" \
              -H "Authorization: Bearer ${BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "$payload")

            http_code=$(echo "$response" | tail -n1)

            if [ "$http_code" = "200" ]; then
              echo "✅ ${SECRET_NAME}"
              SYNCED=$((SYNCED + 1))
            else
              body=$(echo "$response" | head -n-1)
              echo "❌ ${SECRET_NAME} failed (HTTP ${http_code}): ${body}"
              FAILED=$((FAILED + 1))
            fi
          done

          echo ""
          echo "📊 Summary: ${SYNCED} synced, ${FAILED} failed"

          if [ $FAILED -gt 0 ]; then
            exit 1
          fi
