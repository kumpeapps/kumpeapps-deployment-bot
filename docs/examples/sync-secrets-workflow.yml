name: Sync Secrets to Deployment Bot (Advanced)

# [DEPRECATED] This workflow uses the old curl-based approach with admin tokens.
# For new implementations, use the kumpeapps-deployment-bot action instead.
# See: repo-sync-secrets-simple.yml
#
# This example is kept for reference and advanced use cases where you need
# direct API access, custom error handling, or bulk secret management.
# 
# Required secrets in your repository:
#   - DEPLOYMENT_BOT_TOKEN: Admin API token from deployment bot
#   - All secrets referenced in your .kumpeapps-deploy-bot config env_mappings

on:
  workflow_dispatch: # Manual trigger
  push:
    branches: [main, develop]
    paths:
      - '.kumpeapps-deploy-bot/**/*.yml'
      - '.github/workflows/sync-secrets.yml'

jobs:
  sync-dev-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Parse env_mappings from config
        id: parse
        run: |
          # Find the deployment config file
          CONFIG_FILE=$(find .kumpeapps-deploy-bot/dev -name "*.yml" | head -n1)
          
          if [ -z "$CONFIG_FILE" ]; then
            echo "No config file found"
            exit 1
          fi
          
          echo "Using config: $CONFIG_FILE"
          
          # Extract secret names from env_mappings
          SECRET_NAMES=$(grep -A 20 'env_mappings:' "$CONFIG_FILE" | \
            grep -E '^\s+[A-Z_]+:\s*[A-Z_]+' | \
            awk '{print $2}' | \
            tr '\n' ' ')
          
          echo "secrets=$SECRET_NAMES" >> $GITHUB_OUTPUT
          echo "đź”‘ Secrets needed: $SECRET_NAMES"
      
      - name: Sync secrets
        env:
          BOT_URL: http://preprod-deployment-bot.mdhome.net:3000
          BOT_TOKEN: ${{ secrets.DEPLOYMENT_BOT_TOKEN }}
          # IMPORTANT: Add all your secrets here explicitly
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD_SECRET }}
          # Add more secrets as needed:
          # MYSQL_USER: ${{ secrets.MYSQL_USER }}
          # MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
        run: |
          REPO_OWNER="${GITHUB_REPOSITORY%/*}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          
          echo "đźš€ Syncing secrets for $REPO_OWNER/$REPO_NAME"
          
          sync_secret() {
            local name="$1"
            local value="$2"
            
            if [ -z "$value" ]; then
              echo "âš ď¸Ź  ${name}: not set - skipping"
              return
            fi
            
            echo "đź“¤ ${name}..."
            
            response=$(curl -s -w "\n%{http_code}" -X POST \
              "${BOT_URL}/api/admin/repository-secrets/upsert" \
              -H "Authorization: Bearer ${BOT_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{
                \"repositoryOwner\": \"${REPO_OWNER}\",
                \"repositoryName\": \"${REPO_NAME}\",
                \"name\": \"${name}\",
                \"value\": \"${value}\"
              }")
            
            http_code=$(echo "$response" | tail -n1)
            
            if [ "$http_code" = "200" ]; then
              echo "âś… ${name}"
            else
              echo "âťŚ ${name} failed (HTTP ${http_code})"
              exit 1
            fi
          }
          
          # Sync each secret (must match env_mappings in your config)
          sync_secret "DB_PASSWORD_SECRET" "$DB_PASSWORD_SECRET"
          # sync_secret "MYSQL_USER" "$MYSQL_USER"
          
          echo "âś… All secrets synced!"
