name: Sync Secrets to Deployment Bot

# This workflow automatically syncs repository secrets to the deployment bot.
# The action reads your deployment config to determine which secrets are needed,
# then syncs only those secrets that are passed as environment variables.
#
# The KUMPEAPPS_DEPLOY_BOT_TOKEN is automatically created by the bot when
# the GitHub App is installed on your repository.

on:
  workflow_dispatch: # Manual trigger
  push:
    branches: [main, develop]
    paths:
      - '.kumpeapps-deploy-bot/**/*.yml'
      - '.github/workflows/sync-secrets.yml'

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Sync secrets to deployment bot
        uses: kumpeapps/kumpeapps-deployment-bot@v1
        env:
          # Bot token (auto-created when GitHub App is installed)
          KUMPEAPPS_DEPLOY_BOT_TOKEN: ${{ secrets.KUMPEAPPS_DEPLOY_BOT_TOKEN }}
          
          # Your application secrets - the action will automatically detect which
          # ones are needed from your deployment config's env_mappings section.
          # Only secrets listed in env_mappings will be synced.
          #
          # NOTE: Due to GitHub Actions security, you must explicitly pass each
          # secret as an environment variable. The action will validate that all
          # required secrets from your config are present.
          DB_PASSWORD_SECRET: ${{ secrets.DB_PASSWORD_SECRET }}
          # Add your other secrets here:
          # MYSQL_USER: ${{ secrets.MYSQL_USER }}
          # MYSQL_PASS: ${{ secrets.MYSQL_PASS }}
          # API_KEY: ${{ secrets.API_KEY }}
