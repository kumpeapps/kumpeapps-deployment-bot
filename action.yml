name: 'KumpeApps Deployment Bot - Sync Secrets'
description: 'Automatically sync repository secrets to the deployment bot'
author: 'KumpeApps'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  bot-url:
    description: 'Deployment bot URL'
    required: false
    default: 'https://deploy.kumpe.app'
  bot-token:
    description: 'Repository-specific bot token (uses KUMPEAPPS_DEPLOY_BOT_TOKEN secret if not provided)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Sync all secrets to deployment bot
      shell: bash
      env:
        BOT_URL: ${{ inputs.bot-url }}
        BOT_TOKEN: ${{ inputs.bot-token }}
      run: |
        # Use provided token or fall back to standard secret name
        TOKEN="${BOT_TOKEN}"
        if [ -z "$TOKEN" ]; then
          TOKEN="${KUMPEAPPS_DEPLOY_BOT_TOKEN}"
        fi
        
        if [ -z "$TOKEN" ]; then
          echo "::error::No bot token provided. Set KUMPEAPPS_DEPLOY_BOT_TOKEN secret or pass bot-token input."
          exit 1
        fi
        
        REPO_OWNER="${GITHUB_REPOSITORY%/*}"
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        
        echo "::group::Syncing secrets for $REPO_OWNER/$REPO_NAME"
        echo "The action will sync ALL secrets passed as environment variables."
        echo ""
        
        # Get all environment variables, excluding system/GitHub Actions variables
        # We'll sync anything that looks like a secret (uppercase with underscores)
        SECRET_NAMES=$(env | grep -E '^[A-Z][A-Z0-9_]*=' | cut -d= -f1 | grep -v -E '^(GITHUB_|RUNNER_|CI|PATH|HOME|USER|SHELL|PWD|OLDPWD|LANG|LC_|TERM|SHLVL|_|BOT_URL|BOT_TOKEN|ACTIONS_|AGENT_|ANDROID_|AZURE_|CHROME|CONDA|DEPLOYMENT_|DOTNET_|GOROOT|GRADLE_|GRAALVM_|HOMEBREW_|ImageOS|ImageVersion|INVOCATION_ID|JAVA_|JOURNAL_STREAM|LEIN_|NVM_|PERFLOG_|POWERSHELL_|SELENIUM_|SGX_|STATS_|SWIFT_|VCPKG_|INPUT_)')
        
        if [ -z "$SECRET_NAMES" ]; then
          echo "::warning::No secrets found in environment variables to sync"
          echo "::warning::Make sure to pass your secrets in the env section of the action"
          exit 0
        fi
        
        SYNCED=0
        FAILED=0
        
        for SECRET_NAME in $SECRET_NAMES; do
          # Skip KUMPEAPPS_DEPLOY_BOT_TOKEN itself
          if [ "$SECRET_NAME" = "KUMPEAPPS_DEPLOY_BOT_TOKEN" ]; then
            continue
          fi
          
          # Get secret value
          SECRET_VALUE=""
          eval "SECRET_VALUE=\${${SECRET_NAME}:-}"
          
          if [ -z "$SECRET_VALUE" ]; then
            continue
          fi
          
          echo "Syncing ${SECRET_NAME}..."
          
          response=$(curl -s -w "\n%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -X POST \
            "${BOT_URL}/api/admin/repository-secrets/upsert" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repositoryOwner\": \"${REPO_OWNER}\",
              \"repositoryName\": \"${REPO_NAME}\",
              \"name\": \"${SECRET_NAME}\",
              \"value\": \"${SECRET_VALUE}\"
            }")
          
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" = "200" ]; then
            echo "✅ ${SECRET_NAME} synced"
            SYNCED=$((SYNCED + 1))
          else
            body=$(echo "$response" | head -n-1)
            echo "::error::Failed to sync ${SECRET_NAME} (HTTP ${http_code}): ${body}"
            FAILED=$((FAILED + 1))
          fi
        done
        
        echo "::endgroup::"
        echo "::notice::Summary: ${SYNCED} secrets synced successfully ✅"
        
        if [ $FAILED -gt 0 ]; then
          echo "::error::${FAILED} secrets failed to sync"
          exit 1
        fi
