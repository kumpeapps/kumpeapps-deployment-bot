name: 'KumpeApps Deployment Bot - Sync Secrets'
description: 'Automatically sync repository secrets to the deployment bot'
author: 'KumpeApps'
branding:
  icon: 'upload-cloud'
  color: 'blue'

inputs:
  environment:
    description: 'Deployment environment (dev, stage, prod)'
    required: false
    default: 'dev'
  config-path:
    description: 'Path to deployment config (auto-detected if not provided)'
    required: false
    default: ''
  bot-url:
    description: 'Deployment bot URL'
    required: false
    default: 'https://deploy.kumpe.app'
  bot-token:
    description: 'Repository-specific bot token (uses KUMPEAPPS_DEPLOY_BOT_TOKEN secret if not provided)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Detect deployment config
      id: config
      shell: bash
      run: |
        CONFIG_PATH="${{ inputs.config-path }}"
        
        if [ -z "$CONFIG_PATH" ]; then
          ENV="${{ inputs.environment }}"
          SEARCH_DIR=".kumpeapps-deploy-bot/${ENV}"
          
          if [ -d "$SEARCH_DIR" ]; then
            CONFIG_PATH=$(find "$SEARCH_DIR" -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) | head -n1)
          fi
          
          if [ -z "$CONFIG_PATH" ]; then
            echo "::error::No deployment config found in $SEARCH_DIR"
            exit 1
          fi
        fi
        
        echo "config_path=$CONFIG_PATH" >> $GITHUB_OUTPUT
        echo "::notice::Using deployment config: $CONFIG_PATH"
    
    - name: Extract secret names from config
      id: secrets
      shell: bash
      run: |
        CONFIG_FILE="${{ steps.config.outputs.config_path }}"
        
        if [ ! -f "$CONFIG_FILE" ]; then
          echo "::error::Config file not found: $CONFIG_FILE"
          exit 1
        fi
        
        # Extract env_mappings and get secret names (right side of mapping)
        SECRET_NAMES=$(grep -A 50 'env_mappings:' "$CONFIG_FILE" | \
          grep -E '^\s+[A-Z0-9_]+:\s*[A-Z0-9_]+' | \
          awk '{print $2}' | \
          sort -u)
        
        if [ -z "$SECRET_NAMES" ]; then
          echo "::warning::No env_mappings found in deployment config"
          exit 0
        fi
        
        # Convert to comma-separated for easier processing
        SECRET_LIST=$(echo "$SECRET_NAMES" | tr '\n' ',')
        echo "secret_names=$SECRET_LIST" >> $GITHUB_OUTPUT
        echo "::notice::Found secrets in deployment config: $SECRET_LIST"
    
    - name: Validate required secrets are present
      if: steps.secrets.outputs.secret_names != ''
      shell: bash
      env:
        SECRET_NAMES: ${{ steps.secrets.outputs.secret_names }}
      run: |
        # Remove trailing comma
        SECRET_NAMES="${SECRET_NAMES%,}"
        
        # Split by comma
        IFS=',' read -ra SECRETS <<< "$SECRET_NAMES"
        
        MISSING=()
        
        for SECRET_NAME in "${SECRETS[@]}"; do
          if [ -z "$SECRET_NAME" ]; then
            continue
          fi
          
          # Check if secret is in environment
          SECRET_VALUE=""
          eval "SECRET_VALUE=\${${SECRET_NAME}:-}"
          
          if [ -z "$SECRET_VALUE" ]; then
            MISSING+=("$SECRET_NAME")
          fi
        done
        
        if [ ${#MISSING[@]} -gt 0 ]; then
          echo "::error::Required secrets not passed as environment variables:"
          for SECRET_NAME in "${MISSING[@]}"; do
            echo "::error::  - $SECRET_NAME"
          done
          echo "::error::"
          echo "::error::Add missing secrets to your workflow's env section:"
          for SECRET_NAME in "${MISSING[@]}"; do
            echo "::error::    ${SECRET_NAME}: (from GitHub secrets)"
          done
          exit 1
        fi
        
        echo "::notice::All required secrets are present ✓"
    
    - name: Sync secrets to deployment bot
      if: steps.secrets.outputs.secret_names != ''
      shell: bash
      env:
        BOT_URL: ${{ inputs.bot-url }}
        BOT_TOKEN: ${{ inputs.bot-token }}
        SECRET_NAMES: ${{ steps.secrets.outputs.secret_names }}
      run: |
        # Use provided token or fall back to standard secret name
        TOKEN="${BOT_TOKEN}"
        if [ -z "$TOKEN" ]; then
          TOKEN="${KUMPEAPPS_DEPLOY_BOT_TOKEN}"
        fi
        
        if [ -z "$TOKEN" ]; then
          echo "::error::No bot token provided. Set KUMPEAPPS_DEPLOY_BOT_TOKEN secret or pass bot-token input."
          exit 1
        fi
        
        REPO_OWNER="${GITHUB_REPOSITORY%/*}"
        REPO_NAME="${GITHUB_REPOSITORY#*/}"
        
        echo "::group::Syncing secrets for $REPO_OWNER/$REPO_NAME"
        echo "The action will sync only the secrets found in your deployment config's env_mappings."
        echo "Secrets passed as env vars but not in your config will be skipped."
        echo ""
        
        # Remove trailing comma
        SECRET_NAMES="${SECRET_NAMES%,}"
        
        # Split by comma
        IFS=',' read -ra SECRETS <<< "$SECRET_NAMES"
        
        SYNCED=0
        SKIPPED=0
        FAILED=0
        
        for SECRET_NAME in "${SECRETS[@]}"; do
          # Skip empty
          if [ -z "$SECRET_NAME" ]; then
            continue
          fi
          
          # Get secret value from environment
          # GitHub Actions doesn't allow dynamic secret access, so secrets must be
          # explicitly passed as environment variables by the caller
          SECRET_VALUE=""
          eval "SECRET_VALUE=\${${SECRET_NAME}:-}"
          
          if [ -z "$SECRET_VALUE" ]; then
            echo "::debug::Secret ${SECRET_NAME} not provided in env - skipping"
            SKIPPED=$((SKIPPED + 1))
            continue
          fi
          
          echo "Syncing ${SECRET_NAME}..."
          
          response=$(curl -s -w "\n%{http_code}" \
            --connect-timeout 10 \
            --max-time 30 \
            -X POST \
            "${BOT_URL}/api/admin/repository-secrets/upsert" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"repositoryOwner\": \"${REPO_OWNER}\",
              \"repositoryName\": \"${REPO_NAME}\",
              \"name\": \"${SECRET_NAME}\",
              \"value\": \"${SECRET_VALUE}\"
            }")
          
          http_code=$(echo "$response" | tail -n1)
          
          if [ "$http_code" = "200" ]; then
            echo "✅ ${SECRET_NAME} synced"
            SYNCED=$((SYNCED + 1))
          else
            body=$(echo "$response" | head -n-1)
            echo "::error::Failed to sync ${SECRET_NAME} (HTTP ${http_code}): ${body}"
            FAILED=$((FAILED + 1))
          fi
        done
        
        echo "::endgroup::"
        
        if [ $SKIPPED -gt 0 ]; then
          echo "::notice::Summary: ${SYNCED} synced successfully (${SKIPPED} were not in config and skipped)"
        else
          echo "::notice::Summary: ${SYNCED} secrets synced successfully ✅"
        fi
        
        if [ $FAILED -gt 0 ]; then
          echo "::error::${FAILED} secrets failed to sync"
          exit 1
        fi
